<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBT Web 2.0</title>

<style>
:root{
  --green:#00754a;
  --line:#b9b9b9;
  --text:#1f1f1f;
  --ok:#dff3e7;
  --bad:#ffe1e1;
  --gray:#aaa;
  --cbs:#cfe0f6;
  --pick:#ffc000;
  --hand:#d8ccff;
  --espresso:#9a856d;
  --pos:#c6e0b4;
  --food:#ffe699;
  --horno:#f4b183;
  --brew:#6f5445;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:var(--text);
}

.header{
  background:var(--green);
  color:white;
  padding:14px 18px;
  font-size:22px;
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.logo{font-size:24px}

.badge{
  background:white;
  color:var(--green);
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:12px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  position:sticky;
  top:0;
  z-index:50;
  background:#f5f5f5;
  padding:8px 0;
}

.tab{
  flex:1;
  border:none;
  background:#ddd;
  color:#111;
  padding:14px;
  border-radius:14px;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
}

.tab.active{
  background:var(--green);
  color:white;
}

.page{display:none}
.page.active{display:block}

.card{
  background:white;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:visible;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.card-title{
  background:var(--green);
  color:white;
  padding:9px;
  font-weight:900;
  text-align:center;
  border-radius:12px 12px 0 0;
}

.card-body{padding:12px}

.filters{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.filter label{
  display:block;
  font-weight:900;
  font-size:12px;
  margin-bottom:5px;
}

.ms{position:relative}

.ms-btn{
  width:100%;
  border:1px solid #bbb;
  background:white;
  border-radius:10px;
  padding:9px;
  min-height:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-size:12px;
}

.ms-panel{
  display:none;
  position:absolute;
  top:44px;
  left:0;
  right:0;
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  z-index:100;
  padding:8px;
  max-height:260px;
  overflow:auto;
}

.ms.open .ms-panel{display:block}

.ms-search{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:8px;
  margin-bottom:6px;
}

.ms-actions{
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

.ms-actions button{
  flex:1;
  border:none;
  border-radius:8px;
  padding:7px;
  background:#eee;
  font-weight:700;
  cursor:pointer;
}

.ms-option{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px;
  font-size:12px;
}

.ms-option input{
  width:18px;
  height:18px;
}

.partner-select{
  width:100%;
  padding:9px;
  border-radius:10px;
  border:1px solid #bbb;
  font-weight:900;
}

.btn{
  background:var(--green);
  color:white;
  border:none;
  border-radius:10px;
  padding:11px 18px;
  font-weight:900;
  cursor:pointer;
  width:100%;
  margin-top:10px;
  font-size:14px;
}

.status{
  font-size:12px;
  color:#555;
  margin-top:8px;
}

.manual-top{
  display:grid;
  grid-template-columns:1fr 1.45fr 2fr;
  gap:12px;
  align-items:start;
  margin-bottom:12px;
}

.box{
  background:white;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}

.box-title{
  background:var(--green);
  color:white;
  text-align:center;
  padding:7px;
  font-weight:900;
  font-size:14px;
}

.box-body{padding:8px}

.metric-grid{
  display:grid;
  gap:6px;
}

.channels-cafe{grid-template-columns:repeat(2,1fr)}
.channels-dt{grid-template-columns:repeat(3,1fr)}
.mix-grid{grid-template-columns:repeat(5,1fr)}

.metric{
  border:1px solid #c9c9c9;
  background:#f6f6f6;
  padding:6px;
  text-align:center;
}

.metric label{
  display:block;
  font-size:12px;
  font-weight:900;
  margin-bottom:4px;
}

.metric span{
  display:block;
  background:#e6e6e6;
  text-align:center;
  font-size:16px;
  font-weight:900;
  padding:4px;
  color:var(--green);
}

.total{
  margin-top:6px;
  padding:6px;
  text-align:center;
  border-radius:8px;
  font-weight:900;
}

.ok{background:var(--ok);color:var(--green)}
.bad{background:var(--bad);color:#a40000}

.section-title{
  background:var(--green);
  color:white;
  padding:10px;
  border-radius:10px 10px 0 0;
  font-weight:900;
  margin-top:12px;
}

.layout-wrap{
  background:white;
  border:2px solid #222;
  border-radius:0 0 10px 10px;
  overflow:hidden;
}

.layout{
  height:240px;
  position:relative;
  background:white;
}

.area{
  position:absolute;
  border:1px solid #111;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:11px;
  font-weight:900;
}

.gray{background:var(--gray)}
.cbs{background:var(--cbs)}
.pick{background:var(--pick)}
.hand{background:var(--hand)}
.espresso{background:var(--espresso)}
.pos{background:var(--pos)}
.food{background:var(--food)}
.horno{background:var(--horno)}
.brew{background:var(--brew);color:white}

.partner{
  background:var(--green);
  color:white;
  font-size:20px;
}

.support{
  background:white;
  color:var(--green);
  border:1px solid var(--green);
  font-size:18px;
}

details{
  background:white;
  border:1px solid var(--line);
  border-radius:10px;
  margin-top:4px;
  overflow:hidden;
}

summary{
  background:var(--green);
  color:white;
  padding:10px;
  font-weight:900;
  cursor:pointer;
}

.table-wrap{overflow-x:auto}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th{
  background:#006241;
  color:white;
  padding:7px;
  font-size:12px;
}

td{
  border:1px solid #777;
  padding:7px;
  font-size:12px;
}

@media(max-width:760px){
  .header{font-size:18px;padding:12px}
  .logo{font-size:20px}
  .tabs{overflow-x:auto}
  .tab{min-width:150px;padding:12px}
  .filters{grid-template-columns:1fr 1fr}
  .manual-top{grid-template-columns:1fr}
  .mix-grid{grid-template-columns:repeat(2,1fr)}
  .channels-cafe,.channels-dt{grid-template-columns:repeat(2,1fr)}

  .layout{
    height:190px;
    transform:scale(.82);
    transform-origin:top left;
    width:122%;
  }

  .layout-wrap{height:195px}
  .area{font-size:8px}
  .partner{font-size:14px}
}
</style>
</head>

function pct(n){ return `${Math.round(Number(n || 0))}%`; }

function getSourceList(name){
  if(name==="Q") return typeof PBT_QS!=="undefined" ? PBT_QS : [];
  if(name==="DayPart") return typeof PBT_DAYPARTS!=="undefined" ? PBT_DAYPARTS : [];
  if(name==="Mes") return typeof PBT_MESES!=="undefined" ? PBT_MESES : [];
  if(name==="Semana") return typeof PBT_SEMANAS!=="undefined" ? PBT_SEMANAS : [];
  if(name==="Weekpart") return typeof PBT_WEEKPARTS!=="undefined" ? PBT_WEEKPARTS : [];
  if(name==="TiendaCafe") return typeof TIENDAS_CAFE!=="undefined" ? TIENDAS_CAFE : [];
  if(name==="TiendaDT") return typeof TIENDAS_DT!=="undefined" ? TIENDAS_DT : [];
  return [];
}

        <table>
          <thead>
            <tr><th>Partner</th><th>Estación</th><th>Fijo</th><th>Rutinas</th></tr>
          </thead>
          <tbody id="${tab}_tbody"></tbody>
        </table>
      </div>
    </details>
  `;
}

function filterHTML(tab,key,label){
  return `
  <div class="filter">
    <label>${label}</label>
    <div class="ms" id="${tab}_${key}_ms">
      <button class="ms-btn" type="button" onclick="toggleMS('${tab}','${key}')">
        <span id="${tab}_${key}_label">Todos</span><span>▾</span>
      </button>
      <div class="ms-panel">
        <input class="ms-search" placeholder="Buscar..." oninput="searchMS('${tab}','${key}',this.value)">
        <div class="ms-actions">
          <button type="button" onclick="selectAllMS('${tab}','${key}')">Todos</button>
          <button type="button" onclick="clearMS('${tab}','${key}')">Limpiar</button>
        </div>
        <div id="${tab}_${key}_options"></div>
      </div>
    </div>
  </div>`;
}

function populateFilters(){
  ["cafe","dt"].forEach(tab=>{
    fillMS(tab,"q",getSourceList("Q"));
    fillMS(tab,"daypart",getSourceList("DayPart"));
    fillMS(tab,"mes",getSourceList("Mes"));
    fillMS(tab,"semana",getSourceList("Semana"));
    fillMS(tab,"weekpart",getSourceList("Weekpart"));
    fillMS(tab,"tienda",tab==="cafe" ? getSourceList("TiendaCafe") : getSourceList("TiendaDT"));
  });
}

function fillMS(tab,key,values){
  const box = document.getElementById(`${tab}_${key}_options`);
  box.innerHTML = (values || []).map(v=>`
    <label class="ms-option" data-text="${String(v).toLowerCase()}">
      <input type="checkbox" value="${String(v).replaceAll('"','&quot;')}" onchange="changeMS('${tab}','${key}')">
      <span>${v}</span>
    </label>
  `).join("");
  updateMSLabel(tab,key);
}

function toggleMS(tab,key){
  document.querySelectorAll(".ms").forEach(x=>{
    if(x.id !== `${tab}_${key}_ms`) x.classList.remove("open");
  });
  document.getElementById(`${tab}_${key}_ms`).classList.toggle("open");
}

function searchMS(tab,key,value){
  const q = String(value || "").toLowerCase();
  document.querySelectorAll(`#${tab}_${key}_options .ms-option`).forEach(o=>{
    o.style.display = o.dataset.text.includes(q) ? "flex" : "none";
  });
}

function changeMS(tab,key){
  state[tab].filters[key] = [...document.querySelectorAll(`#${tab}_${key}_options input:checked`)].map(x=>x.value);
  updateMSLabel(tab,key);
}

function selectAllMS(tab,key){
  document.querySelectorAll(`#${tab}_${key}_options input`).forEach(x=>x.checked=true);
  changeMS(tab,key);
}

function clearMS(tab,key){
  document.querySelectorAll(`#${tab}_${key}_options input`).forEach(x=>x.checked=false);
  changeMS(tab,key);
}

function updateMSLabel(tab,key){
  const arr = state[tab].filters[key] || [];
  document.getElementById(`${tab}_${key}_label`).textContent =
    arr.length === 0 ? "Todos" : arr.length === 1 ? arr[0] : `${arr.length} seleccionados`;
}

function getEngineFilters(tab){
  const f = state[tab].filters;
  return {Q:f.q,DayPart:f.daypart,Mes:f.mes,Semana:f.semana,Weekpart:f.weekpart,Tienda:f.tienda};
}

function calculate(tab){
  if(typeof PBT_ENGINE === "undefined" || typeof PBT_ENGINE.calculate !== "function"){
    return {venta:0,registros:0,tiendasVisibles:0,mix:{},canales:{}};
  }
  return PBT_ENGINE.calculate(getEngineFilters(tab), config[tab].tipoEngine);
}

function canalValue(canales,k){
  if(k === "Pick up & Delivery"){
    return canales["Pick up & Delivery"] ?? canales.PickUpDelivery ?? canales["PickUpDelivery"] ?? 0;
  }
  return canales[k] ?? 0;
}

function render(tab){
  const c = config[tab];
  const data = calculate(tab);
  const mix = data.mix || {};
  const canales = data.canales || {};

  document.getElementById(`${tab}_partners_show`).textContent = state[tab].partners;

  document.getElementById(`${tab}_mix`).innerHTML = categories.map(k=>`
    <div class="metric"><label>${k}</label><span>${pct(mix[k] || 0)}</span></div>
  `).join("");

  document.getElementById(`${tab}_channels`).innerHTML = c.channelLabels.map(k=>`
    <div class="metric"><label>${k}</label><span>${pct(canalValue(canales,k))}</span></div>
  `).join("");

  const mixTotal = categories.reduce((s,k)=>s + Math.round(Number(mix[k] || 0)),0);
  const channelTotal = c.channelLabels.reduce((s,k)=>s + Math.round(Number(canalValue(canales,k))),0);

  document.getElementById(`${tab}_mixTotal`).textContent = `Total: ${mixTotal}%`;
  document.getElementById(`${tab}_mixTotal`).className = mixTotal === 100 ? "total ok" : "total bad";

  document.getElementById(`${tab}_channelTotal`).textContent = `Total: ${channelTotal}%`;
  document.getElementById(`${tab}_channelTotal`).className = channelTotal === 100 ? "total ok" : "total bad";

  document.getElementById(`${tab}_status`).textContent =
    `Registros filtrados: ${Number(data.registros || 0).toLocaleString("es-MX")} | Tiendas visibles: ${Number(data.tiendasVisibles || 0).toLocaleString("es-MX")}`;

  updatePartnerTable(tab);
}

function getRoutineRows(tab){
  const qty = state[tab].partners;
  return ROUTINES[tab][qty] || [];
}

function setPartners(tab){
  state[tab].partners = Number(document.getElementById(`${tab}_partners`).value);
  render(tab);
}

function updatePartnerTable(tab){
  const rows = getRoutineRows(tab);

  document.getElementById(`${tab}_tbody`).innerHTML = rows.map(r=>`
    <tr><td>${r[0]}</td><td>${cleanStation(r[1])}</td><td>${r[2]}</td><td>${r[3]}</td></tr>
  `).join("");

  const layer = document.getElementById(`${tab}_markers`);
  layer.innerHTML = rows.map((r)=>{
    let p = POS[tab][r[1]];
    if(!p) p = POS[tab]["Soporte Bajo"] || POS[tab]["Soporte Alto"];

    const cls = p.fijo ? "partner" : "support";
    return `<div class="area ${cls}" data-letter="${r[0]}" style="left:${p.left}%;top:${p.top}%;width:${p.w}%;height:${p.h}%">${r[0]}</div>`;
  }).join("");
}

function cleanStation(x){
  return String(x)
    .replace("Soporte Alto","Soporte")
    .replace("Soporte Bajo","Soporte")
    .replace("Soporte Extra 2","Soporte")
    .replace("Soporte Extra","Soporte");
}

function actualizarLayout(){
  render(activeTab);
}

function showTab(tab){
  activeTab = tab;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  document.getElementById(tab==="cafe" ? "tabCafe" : "tabDt").classList.add("active");

  render(tab);
}

document.addEventListener("click",e=>{
  if(!e.target.closest(".ms")){
    document.querySelectorAll(".ms").forEach(x=>x.classList.remove("open"));
  }
});

function init(){
  if(typeof PBT_ENGINE === "undefined"){
    alert("No se encontró PBT_ENGINE. Verifica que data.js esté junto a index.html.");
    return;
  }

  buildPage("cafe");
  buildPage("dt");
  populateFilters();
  render("cafe");
}

init();
