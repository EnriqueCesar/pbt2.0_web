</style></head><body><header class="header"><div class="logo">☕ PBT Web 2.0</div><div class="badge">Product Mix y canales | Sin decimales | Lógica PBT.24</div></header><div class="container"><div class="tabs"><button class="tab active" id="tabCafe" onclick="showTab('cafe')">CAFE</button><button class="tab" id="tabDt" onclick="showTab('dt')">DRIVE THRU</button></div><section id="cafe" class="page active"></section><section id="dt" class="page"></section></div><nav class="quick-nav" aria-label="Navegación rápida PBT">

  <button type="button" onclick="showTab('cafe');window.scrollTo({top:0,behavior:'smooth'})">CAFE</button>
  <button type="button" onclick="showTab('dt');window.scrollTo({top:0,behavior:'smooth'})">DT</button>
</nav><script src="js/data.js"></script><script src="js/excel_data.js"></script><script>
/* EXCEL_DATA fue movido a js/excel_data.js para reducir el peso de index.html. */
const MAPS = {cafe:null,dt:null};
function buildPlayMap(tab){
  if(MAPS[tab]) return MAPS[tab];
  const entries = tab==='cafe'?EXCEL_DATA.cafePlayEntries:EXCEL_DATA.dtPlayEntries;
  const m = Object.create(null);
  entries.forEach(([k,p])=>{m[k]=p;});
  MAPS[tab]=m; return m;
}
function round0(v){ v=Number(v||0); return Number.isFinite(v)?Math.round(v):0; }
function pctText(n){return `${round0(n)}%`;}
function capFecha(txt){return txt.replace(/(^|\s)([a-záéíóúñ])/g,(m,e,l)=>e+l.toUpperCase());}
function fechaLarga(value){ if(!value) return 'Sin fecha seleccionada'; const d=new Date(value+'T00:00:00'); return capFecha(d.toLocaleDateString('es-MX',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}));}
function setFecha(tab){const input=document.getElementById(`${tab}_fecha`); if(!input) return; sessionStorage.setItem(`${tab}_fechaOperacion`,input.value); const t=document.getElementById(`${tab}_fechaTexto`); if(t) t.textContent=fechaLarga(input.value);}
function cargarFecha(tab){const input=document.getElementById(`${tab}_fecha`); if(!input) return; input.value=sessionStorage.getItem(`${tab}_fechaOperacion`) || new Date().toISOString().slice(0,10); setFecha(tab);}
function dist(a,b){let s=0; for(let i=0;i<8;i++){let d=(a[i]||0)-(b[i]||0); s+=d*d;} return s;}
function nearestMix(tab, vals){const arr=tab==='cafe'?EXCEL_DATA.cafeCandidates:EXCEL_DATA.dtCandidates; let best=arr[0], bd=Infinity; for(const x of arr){const d=dist(x,vals); if(d<bd){bd=d; best=x; if(d===0) break;}} return best;}
function getPlay(tab, partners, channels, mix){
  const vals = tab==='cafe' ? [channels.lobby,channels.mop,0,mix.esp,mix.brew,mix.cbs,mix.food,mix.other] : [channels.lobby,channels.mop,channels.dt,mix.esp,mix.brew,mix.cbs,mix.food,mix.other];
  const nearest = nearestMix(tab, vals.map(round0));
  const key = [round0(partners), ...nearest].join(',');
  const play = buildPlayMap(tab)[key];
  return {play, nearest, key};
}
function cellPos(row,col){
  const startRow=18, rows=10, startCol=2, cols=14;
  return {left:(col-startCol)/cols*100, top:(row-startRow)/rows*100, width:100/cols, height:100/rows};
}
function block(cls,row,col,rowspan,colspan,text){const p=cellPos(row,col); return `<div class="area ${cls}" style="left:${p.left}%;top:${p.top}%;width:${p.width*colspan}%;height:${p.height*rowspan}%">${text}</div>`;}
function staticLayout(tab){
  if(tab==='cafe') return [
    block('gray',18,2,3,3,''), block('cbs',18,5,1,3,'CBS'), block('brew',18,10,1,3,'Café Filtrado'), block('horno',18,13,1,1,'Horno'), block('horno',18,14,1,1,'Horno'),
    block('pick',21,2,2,1,'Pick up'), block('hand',23,2,1,2,'Hand off'), block('espresso',23,5,1,1,'Espresso'), block('espresso',23,7,1,1,'Espresso'), block('pos',23,9,1,1,'POS'), block('pos',23,11,1,1,'POS'), block('food',23,13,1,2,'Foodcase')
  ].join('');
  return [
    block('gray',18,2,8,1,''), block('gray',18,4,3,7,''), block('empty-zone',18,15,8,1,''), block('',18,4,1,2,'Ventana DT'), block('',19,6,1,1,'DTR'), block('',20,6,1,1,'DTO'),
    block('cbs',22,3,2,1,'CBS'), block('pick',24,3,2,1,'Pick up'), block('hand',26,3,1,2,'Hand off'), block('brew',21,11,1,3,'Café Filtrado'), block('horno',21,14,1,1,'Horno'), block('horno',21,15,1,1,'Horno'),
    block('espresso',26,6,1,1,'Espresso'), block('espresso',26,8,1,1,'Espresso'), block('pos',26,10,1,1,'POS'), block('pos',26,12,1,1,'POS'), block('food',26,14,1,2,'Foodcase')
  ].join('');
}
function layoutMarkers(tab, play){
  const layoutName = tab==='cafe'?'Cafe_S_2M2O2P_Left_1':'Dt_L_2M2O2P_Left_1';
  const rows = EXCEL_DATA.routines[play] || [];
  const fixedByPartner = Object.create(null);
  rows.forEach(r=>{fixedByPartner[String(r[0]).replace('.','').trim()] = String(r[2]).toLowerCase().startsWith('s') || String(r[2]).toLowerCase()==='yes';});
  const tabletOn = tab==='dt' && state.dt && state.dt.partnerTablet==='Sí';
  const cs0Raw = (EXCEL_DATA.coords[play] || []).filter(x=>x[0]===layoutName);
  const cs0 = cs0Raw.filter(x=>!(tab==='cafe' && (Number(x[1])+17)>=25 && (Number(x[1])+17)<=27)); /* Café: oculta filas 25, 26 y 27 sin alterar la lógica */
  const movedTablet = tabletOn ? cs0.find(x=>Number(x[1])===3 && Number(x[2])===4) : null; /* Excel E20 -> J17 cuando D15 = Sí */
  const cs = tabletOn ? cs0.filter(x=>!(Number(x[1])===3 && Number(x[2])===4)) : cs0;
  let html = cs.map(([layout,row,col,letter])=>{const p=cellPos(row+17,col+1); const clean=String(letter).replace('.','').trim(); const cls=fixedByPartner[clean]?'partner':'support'; return `<div class="area ${cls} partner-marker" style="left:${p.left}%;top:${p.top}%;width:${p.width}%;height:${p.height}%"><span class="marker-letter">${letter}</span><span class="marker-name">${getPartnerName(tab, clean)}</span></div>`;}).join('');
  if(movedTablet){const letter=movedTablet[3]; const clean=String(letter).replace('.','').trim(); const cls=fixedByPartner[clean]?'partner':'support'; const p=cellPos(18,10); html += `<div class="area ${cls} partner-marker" title="Partner Tablet: E20 → J17" style="left:${p.left}%;top:0%;width:${p.width}%;height:${p.height}%"><span class="marker-letter">${letter}</span><span class="marker-name">${getPartnerName(tab, clean)}</span></div>`;}
  return html;
}
function renderLayout(tab, play){ const el=document.getElementById(`${tab}_layout`); if(el) el.innerHTML=staticLayout(tab)+layoutMarkers(tab,play); }
function getPartnerName(tab, letter){
  try{return localStorage.getItem(`pbt_${tab}_partner_${letter}`)||'';}catch(e){return '';}
}
function setPartnerName(tab, letter, el){
  let v=String(el.value||'').replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ0-9 ._-]/g,'').slice(0,8);
  el.value=v.toUpperCase();
  try{localStorage.setItem(`pbt_${tab}_partner_${letter}`,el.value);}catch(e){}
}
function renderRoutines(tab, play){
  const rows = EXCEL_DATA.routines[play] || [];
  const tbody=document.getElementById(`${tab}_tbody`); if(!tbody) return;
  const tabletOn = tab==='dt' && state.dt && state.dt.partnerTablet==='Sí';
  tbody.innerHTML = rows.map(r=>{
    const letra=String(r[0]||'');
    const nombre=getPartnerName(tab, letra);
    const estacion = tabletOn ? `${r[1]} + Carril` : r[1];
    const rutina = tabletOn ? `${r[3]} + Tablet` : r[3];
    return `<tr><td><div class="partner-name-cell"><span class="partner-letter">${letra}</span><input class="partner-name-input" maxlength="8" value="${nombre}" placeholder="Nombre" oninput="setPartnerName('${tab}','${letra}',this)" title="Nombre corto máximo 8 caracteres"></div></td><td>${estacion}</td><td>${r[2]}</td><td>${rutina}</td></tr>`;
  }).join('');
}
function setTotals(tab, channels, mix){
  const chTotal = tab==='cafe' ? round0(channels.lobby)+round0(channels.mop) : round0(channels.lobby)+round0(channels.mop)+round0(channels.dt);
  const mixTotal = round0(mix.esp)+round0(mix.brew)+round0(mix.cbs)+round0(mix.food)+round0(mix.other);
  const ch=document.getElementById(`${tab}_channelTotal`), mt=document.getElementById(`${tab}_mixTotal`);
  if(ch){ch.textContent=`Total: ${chTotal}%`; ch.className=chTotal===100?'total ok':'total bad';}
  if(mt){mt.textContent=`Total: ${mixTotal}%`; mt.className=mixTotal===100?'total ok':'total bad';}
  return {chTotal,mixTotal,valid:chTotal===100 && mixTotal===100};
}
function valuesFromInputs(tab){
  const q=id=>round0(document.getElementById(`${tab}_${id}`).value);
  return {partners:q('partners'), channels:{lobby:q('lobby'),mop:q('mop'),dt:tab==='dt'?q('dt'):0}, mix:{esp:q('esp'),brew:q('brew'),cbs:q('cbs'),food:q('food'),other:q('other')}};
}
function showMsg(tab,msg,ok=true){const el=document.getElementById(`${tab}_status`); if(el){el.textContent=msg; el.className=`status-msg ${ok?'ok':'bad'}`;}}
function applyManual(tab){
  const v=valuesFromInputs(tab); const totals=setTotals(tab,v.channels,v.mix);
  if(!totals.valid){showMsg(tab,`No se actualizó: Canales ${totals.chTotal}% | Mix ${totals.mixTotal}%. Ambos deben sumar 100%.`,false); return;}
  const res=getPlay(tab,v.partners,v.channels,v.mix);
  if(!res.play){showMsg(tab,`No se encontró play en PBT.24 para la combinación: ${res.key}`,false); return;}
  renderLayout(tab,res.play); renderRoutines(tab,res.play);
  showMsg(tab,`Lay Out actualizado fiel al PBT.24 | Play: ${res.play} | Mix base Excel: ${res.nearest.join('% / ')}%`,true);
}
function showTab(tab){activeTab=tab; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.getElementById(tab).classList.add('active'); document.getElementById(tab==='cafe'?'tabCafe':'tabDt').classList.add('active'); if(typeof renderDataTab==='function') renderDataTab(tab);}
</script><script>
function todayDM(){const d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function cleanDM(value){let v=String(value||'').replace(/[^0-9]/g,'').slice(0,4); if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2); return v;}
function pad2(n){return String(n).padStart(2,'0');}
function getOperationalContext(date=new Date()){
  const day=date.getDay();
  const hour=date.getHours();
  const minute=date.getMinutes();
  const weekpart=(day>=1 && day<=4)?'Weekday':'Weekend';
  let daypart='Afternoon';
  if(hour>=6 && hour<12) daypart='Morning';
  else if(hour>=12 && hour<17) daypart='Lunch';
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return {weekpart,daypart,stamp:`${dias[day]} ${pad2(date.getDate())}/${pad2(date.getMonth()+1)} · ${pad2(hour)}:${pad2(minute)}`,key:`${weekpart}|${daypart}|${pad2(date.getDate())}/${pad2(date.getMonth()+1)}|${pad2(hour)}`};
}
let operationalKey='';
let autoWeekPart='';
let autoDayPart='';
function applyOperationalContext(force=false){
  const ctx=getOperationalContext();
  ['cafe','dt'].forEach(tab=>{
    if(state[tab]){
      autoWeekPart=ctx.weekpart;
      autoDayPart=ctx.daypart;
      state[tab].filters.weekpart=[autoWeekPart];
      state[tab].filters.daypart=[autoDayPart];
      const box=document.getElementById(`${tab}_op_clock`);
      if(box){
        box.querySelector('.op-time').textContent=ctx.stamp;
        box.querySelector('.op-context').textContent=`${ctx.weekpart} · ${ctx.daypart}`;
      }
    }
  });
  if(force || ctx.key!==operationalKey){
    operationalKey=ctx.key;
    if(typeof renderDataTab==='function'){
      renderDataTab('cafe');
      renderDataTab('dt');
    }
  }
}
function autoRender(tab){ if(typeof renderDataTab==='function') renderDataTab(tab); }

let activeTab='cafe';
const state={cafe:{filters:{q:[],daypart:[],mes:[],semana:[],weekpart:[],tienda:[]},partners:4},dt:{filters:{q:[],daypart:[],mes:[],semana:[],weekpart:[],tienda:[]},partners:11,partnerTablet:'No'}};
const config={cafe:{title:'CAFE',maxPartners:11,tipoEngine:'CAFE',channelLabels:[['Lobby','G14','lobby'],['Pick up & Delivery','H14','mop']]},dt:{title:'DRIVE THRU',maxPartners:13,tipoEngine:'DT',channelLabels:[['Lobby','G14','lobby'],['Pick up & Delivery','H14','mop'],['DT','I14','dt']]}};
const mixLabels=[['Espresso','K14','esp'],['Café filtrado','L14','brew'],['CBS','K15','cbs'],['Food','L15','food'],['Otro','K16','other']];
function getSourceList(name){if(name==='Q')return typeof PBT_QS!=='undefined'?PBT_QS:[]; if(name==='DayPart')return typeof PBT_DAYPARTS!=='undefined'?PBT_DAYPARTS:[]; if(name==='Mes')return typeof PBT_MESES!=='undefined'?PBT_MESES:[]; if(name==='Semana')return typeof PBT_SEMANAS!=='undefined'?PBT_SEMANAS:[]; if(name==='Weekpart')return typeof PBT_WEEKPARTS!=='undefined'?PBT_WEEKPARTS:[]; if(name==='TiendaCafe')return typeof TIENDAS_CAFE!=='undefined'?TIENDAS_CAFE:[]; if(name==='TiendaDT')return typeof TIENDAS_DT!=='undefined'?TIENDAS_DT:[]; return [];}
function filterHint(key){if(key==='weekpart')return '<span class="filter-hint">Weekday / Weekend</span>'; if(key==='daypart')return '<span class="filter-hint">Horario operativo</span>'; return '';}
function filterHTML(tab,key,label){return `<div class="filter"><label>${label}${filterHint(key)}</label><div class="ms" id="${tab}_${key}_ms"><button class="ms-btn" type="button" onclick="toggleMS('${tab}','${key}')"><span id="${tab}_${key}_label">Todos</span><span>▾</span></button><div class="ms-panel"><input class="ms-search" placeholder="Buscar..." oninput="searchMS('${tab}','${key}',this.value)"><div class="ms-actions"><button type="button" onclick="selectAllMS('${tab}','${key}')">Todos</button><button type="button" onclick="clearMS('${tab}','${key}')">Limpiar</button></div><div id="${tab}_${key}_options"></div></div></div></div>`;}

function storeSearchHTML(tab,label){
  return `<div class="store-search">
    <label>${label}<span class="filter-hint">Busca por nombre y selecciona una tienda</span></label>
    <div class="store-search-wrap">
      <input class="store-search-input" id="${tab}_tienda_search" placeholder="Buscar tienda... Ej. Sor Juana" autocomplete="off"
        oninput="searchStore('${tab}',this.value)" onfocus="searchStore('${tab}',this.value)" onkeydown="storeKeydown(event,'${tab}')">
      <button class="store-search-clear" type="button" onclick="clearStore('${tab}')">Todos</button>
    </div>
    <div class="store-selected" id="${tab}_tienda_selected">Todas las tiendas</div>
    <div class="store-results" id="${tab}_tienda_results"></div>
  </div>`;
}
function normalizeStoreText(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}
function getStoreList(tab){
  return tab==='cafe'?getSourceList('TiendaCafe'):getSourceList('TiendaDT');
}
function searchStore(tab,value){
  const box=document.getElementById(`${tab}_tienda_results`);
  if(!box) return;
  const q=normalizeStoreText(value);
  const list=getStoreList(tab)||[];
  let matches;
  if(!q){
    matches=list.slice(0,12);
  }else{
    const terms=q.split(/\s+/).filter(Boolean);
    matches=list.filter(name=>{
      const n=normalizeStoreText(name);
      return terms.every(t=>n.includes(t));
    }).slice(0,15);
  }
  if(matches.length===0){
    box.innerHTML='<div class="store-empty">Sin coincidencias. Prueba con otra palabra de la tienda.</div>';
  }else{
    box.innerHTML=matches.map((name,i)=>`<button type="button" class="store-option ${i===0?'active':''}" onclick="selectStore('${tab}',${JSON.stringify(String(name)).replace(/"/g,'&quot;')})"><span>${name}</span><small>Seleccionar</small></button>`).join('');
  }
  box.classList.add('open');
}
function storeKeydown(ev,tab){
  const box=document.getElementById(`${tab}_tienda_results`);
  if(!box) return;
  const items=[...box.querySelectorAll('.store-option')];
  if(ev.key==='Enter'){
    ev.preventDefault();
    const active=box.querySelector('.store-option.active')||items[0];
    if(active) active.click();
  }else if(ev.key==='Escape'){
    box.classList.remove('open');
  }else if(ev.key==='ArrowDown' || ev.key==='ArrowUp'){
    ev.preventDefault();
    if(items.length===0) return;
    let idx=items.findIndex(x=>x.classList.contains('active'));
    if(idx<0) idx=0;
    items[idx].classList.remove('active');
    idx = ev.key==='ArrowDown' ? Math.min(idx+1,items.length-1) : Math.max(idx-1,0);
    items[idx].classList.add('active');
    items[idx].scrollIntoView({block:'nearest'});
  }
}
function selectStore(tab,name){
  state[tab].filters.tienda=[String(name)];
  const input=document.getElementById(`${tab}_tienda_search`);
  const selected=document.getElementById(`${tab}_tienda_selected`);
  const results=document.getElementById(`${tab}_tienda_results`);
  if(input) input.value=String(name);
  if(selected) selected.textContent='Tienda seleccionada: '+String(name);
  if(results) results.classList.remove('open');
  renderDataTab(tab);
}
function clearStore(tab){
  state[tab].filters.tienda=[];
  const input=document.getElementById(`${tab}_tienda_search`);
  const selected=document.getElementById(`${tab}_tienda_selected`);
  const results=document.getElementById(`${tab}_tienda_results`);
  if(input) input.value='';
  if(selected) selected.textContent='Todas las tiendas';
  if(results) results.classList.remove('open');
  renderDataTab(tab);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.store-search')) document.querySelectorAll('.store-results').forEach(x=>x.classList.remove('open'));
});

function buildPage(tab){const c=config[tab]; document.getElementById(tab).innerHTML=`
<div class="card"><div class="card-title">Filtros operativos</div><div class="card-body"><div class="filters operativo">${filterHTML(tab,'mes','Mes')}<div class="filter"><label>Partners</label><select class="partner-select" id="${tab}_partners" onchange="setPartners('${tab}')">${Array.from({length:c.maxPartners},(_,i)=>`<option value="${i+1}" ${i+1===state[tab].partners?'selected':''}>${i+1}</option>`).join('')}</select></div>${tab==='dt'?`<div class="filter"><label>Partner Tablet</label><select class="partner-select" id="${tab}_partnerTablet_filter" onchange="setPartnerTablet('${tab}', this.value)"><option value="No" ${state.dt.partnerTablet==='No'?'selected':''}>No</option><option value="Sí" ${state.dt.partnerTablet==='Sí'?'selected':''}>Sí</option></select></div>`:''}<div class="op-clock-card" id="${tab}_op_clock"><div class="op-label">Reloj operativo</div><div class="op-time">--/-- · --:--</div><div class="op-context">WeekPart · DayPart</div><div class="op-rule">Auto: Lun–Jue Weekday | Vie–Dom Weekend</div></div></div>${storeSearchHTML(tab,tab==='cafe'?'Tienda (solo sin % DT)':'Tienda (solo con % DT)')}<div class="status" id="${tab}_status">Base lista.</div><div class="excel-note">WeekPart y DayPart se calculan automáticamente por reloj operativo; se actualiza al abrir y cada hora.</div></div></div>
<div class="manual-top"><div class="box"><div class="box-title">Información de turno</div><div class="box-body"><div class="metric"><label>Partners <span class="cell-tag">D14</span></label><span id="${tab}_partners_show">${state[tab].partners}</span></div></div></div>
<div class="box"><div class="box-title">Distribución de canales</div><div class="box-body"><div class="metric-grid ${tab==='cafe'?'channels-cafe':'channels-dt'}" id="${tab}_channels"></div><div class="total ok" id="${tab}_channelTotal">Total: 100%</div></div></div>
<div class="box"><div class="box-title">Mix de productos</div><div class="box-body"><div class="metric-grid mix-grid" id="${tab}_mix"></div><div class="total ok" id="${tab}_mixTotal">Total: 100%</div></div></div></div>
<div class="section-title">Plan de distribución recomendado — ${c.title}</div><div class="layout-wrap"><div class="layout" id="${tab}_layout"></div></div><details open><summary>Rutinas de Partners</summary><div class="table-wrap"><table><thead><tr><th>Nombre corto</th><th>Estación</th><th>Fijo</th><th>Rutinas</th></tr></thead><tbody id="${tab}_tbody"></tbody></table></div></details>`;}
function msDisplay(key,v){const val=String(v); if(key==='weekpart'){const meta=/weekend/i.test(val)?'Vie–Dom':(/weekday/i.test(val)?'Lun–Jue':''); return {main:val,meta};} if(key==='daypart'){const meta=/morning/i.test(val)?'6am–12pm':(/lunch/i.test(val)?'12pm–5pm':(/afternoon/i.test(val)?'5pm–6am':'')); return {main:val,meta};} return {main:val,meta:''};}
function fillMS(tab,key,values){const box=document.getElementById(`${tab}_${key}_options`); if(!box) return; box.innerHTML=(values||[]).map(v=>{const d=msDisplay(key,v); const safe=String(v).replaceAll('"','&quot;'); const text=(String(v)+' '+(d.meta||'')).toLowerCase(); return `<label class="ms-option" data-text="${text}"><input type="checkbox" value="${safe}" onchange="changeMS('${tab}','${key}')"><span class="ms-option-text"><span class="ms-main">${d.main}</span>${d.meta?`<span class="ms-meta">${d.meta}</span>`:''}</span></label>`;}).join(''); updateMSLabel(tab,key);}
function populateFilters(){['cafe','dt'].forEach(tab=>{fillMS(tab,'mes',getSourceList('Mes'));});}
function toggleMS(tab,key){document.querySelectorAll('.ms').forEach(x=>{if(x.id!==`${tab}_${key}_ms`)x.classList.remove('open');});document.getElementById(`${tab}_${key}_ms`).classList.toggle('open');}
function searchMS(tab,key,value){const q=String(value||'').toLowerCase();document.querySelectorAll(`#${tab}_${key}_options .ms-option`).forEach(o=>{o.style.display=o.dataset.text.includes(q)?'flex':'none';});}
function changeMS(tab,key){state[tab].filters[key]=[...document.querySelectorAll(`#${tab}_${key}_options input:checked`)].map(x=>x.value);updateMSLabel(tab,key); if(key==='mes') autoRender(tab);}
function selectAllMS(tab,key){document.querySelectorAll(`#${tab}_${key}_options input`).forEach(x=>x.checked=true);changeMS(tab,key);} function clearMS(tab,key){document.querySelectorAll(`#${tab}_${key}_options input`).forEach(x=>x.checked=false);changeMS(tab,key);} function updateMSLabel(tab,key){const arr=state[tab].filters[key]||[];document.getElementById(`${tab}_${key}_label`).textContent=arr.length===0?'Todos':arr.length===1?arr[0]:`${arr.length} seleccionados`;}
function getEngineFilters(tab){const f=state[tab].filters;return {Q:f.q,DayPart:f.daypart,Mes:f.mes,Semana:f.semana,Weekpart:f.weekpart,Tienda:f.tienda};}
function calculate(tab){if(typeof PBT_ENGINE==='undefined'||typeof PBT_ENGINE.calculate!=='function')return {registros:0,tiendasVisibles:0,mix:{},canales:{}}; return PBT_ENGINE.calculate(getEngineFilters(tab),config[tab].tipoEngine);}
function pick(obj,names){for(const n of names){if(obj && obj[n]!=null) return obj[n];} return 0;}
function valuesFromData(tab){const data=calculate(tab), mix=data.mix||{}, canales=data.canales||{}; return {raw:data, partners:state[tab].partners, channels:{lobby:round0(pick(canales,['Lobby','Cafe','CAFE'])),mop:round0(pick(canales,['Pick up & Delivery','PickUpDelivery','MOP & Delivery','MOP'])),dt:tab==='dt'?round0(pick(canales,['DT','Drive Thru'])):0}, mix:{esp:round0(pick(mix,['Espresso','ESPRESSO'])),brew:round0(pick(mix,['Café filtrado','Café Filtrado','CafeFiltrado','BREWED','Brewed'])),cbs:round0(pick(mix,['CBS'])),food:round0(pick(mix,['Food','FOOD'])),other:round0(pick(mix,['Otro','Other','OTHER']))}};}
function renderDataTab(tab){const c=config[tab], v=valuesFromData(tab); document.getElementById(`${tab}_partners_show`).textContent=v.partners; document.getElementById(`${tab}_channels`).innerHTML=c.channelLabels.map(([lab,cell,key])=>`<div class="metric"><label>${lab}<span class="cell-tag">${cell}</span></label><span>${pctText(v.channels[key])}</span></div>`).join(''); document.getElementById(`${tab}_mix`).innerHTML=mixLabels.map(([lab,cell,key])=>`<div class="metric"><label>${lab}<span class="cell-tag">${cell}</span></label><span>${pctText(v.mix[key])}</span></div>`).join(''); const totals=setTotals(tab,v.channels,v.mix); const res=getPlay(tab,v.partners,v.channels,v.mix); if(res.play){renderLayout(tab,res.play); renderRoutines(tab,res.play);} document.getElementById(`${tab}_status`).textContent = `Registros filtrados: ${Number(v.raw.registros||0).toLocaleString('es-MX')} | Tiendas visibles: ${Number(v.raw.tiendasVisibles||0).toLocaleString('es-MX')} | Play PBT.24: ${res.play||'No encontrado'} | Canales ${totals.chTotal}% | Mix ${totals.mixTotal}%${tab==='dt'?' | Partner Tablet '+state.dt.partnerTablet:''}`;}
function setPartners(tab){state[tab].partners=Number(document.getElementById(`${tab}_partners`).value);renderDataTab(tab);} function syncPartnerTabletSelects(){['dt_partnerTablet_filter'].forEach(id=>{const el=document.getElementById(id); if(el) el.value=state.dt.partnerTablet||'No';});} function setPartnerTablet(tab,value){if(tab==='dt'){state.dt.partnerTablet=value || (document.getElementById(`${tab}_partnerTablet_filter`)?.value) || 'No'; syncPartnerTabletSelects(); renderDataTab(tab);}} function setPlanDate(tab,value){const v=cleanDM(value||todayDM()); if(!state[tab]) return; state[tab].planDateDM=v; const input=document.getElementById(`${tab}_planDate`); if(input && input.value!==v) input.value=v;} buildPage('cafe'); buildPage('dt'); populateFilters(); syncPartnerTabletSelects(); applyOperationalContext(true); setInterval(()=>applyOperationalContext(false), 60*1000);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg){ console.log('PBT Web 2.0 listo como PWA', reg.scope); })
      .catch(function(err){ console.log('No se pudo registrar sw.js', err); });
  });
}
