function getEngineFilters(tab){const f=state[tab].filters;return{Q:f.q,DayPart:f.daypart,Mes:f.mes,Semana:f.semana,Weekpart:f.weekpart,Tienda:f.tienda}}
function calculate(tab){if(typeof PBT_ENGINE==="undefined"||typeof PBT_ENGINE.calculate!=="function")return{venta:0,registros:0,tiendasVisibles:0,mix:{},canales:{}};return PBT_ENGINE.calculate(getEngineFilters(tab),config[tab].tipoEngine)}
function render(tab){const c=config[tab],data=calculate(tab),mix=data.mix||{},canales=data.canales||{};document.getElementById(`${tab}_mix`).innerHTML=categories.map(k=>`<div class="metric"><label>${k}</label><span>${pct(mix[k]||0)}</span></div>`).join("");document.getElementById(`${tab}_channels`).innerHTML=c.channelLabels.map(k=>`<div class="metric"><label>${k}</label><span>${pct(canales[k]||0)}</span></div>`).join("");const mixTotal=categories.reduce((s,k)=>s+Number(mix[k]||0),0),channelTotal=c.channelLabels.reduce((s,k)=>s+Number(canales[k]||0),0);document.getElementById(`${tab}_mixTotal`).textContent=`Total: ${mixTotal}%`;document.getElementById(`${tab}_mixTotal`).className=mixTotal===100?"total ok":"total bad";document.getElementById(`${tab}_channelTotal`).textContent=`Total: ${channelTotal}%`;document.getElementById(`${tab}_channelTotal`).className=channelTotal===100?"total ok":"total bad";document.getElementById("kpiVentas").textContent=money(data.venta||0);document.getElementById("kpiMix").textContent=`${mixTotal}%`;document.getElementById("kpiCanales").textContent=`${channelTotal}%`;document.getElementById("kpiPartners").textContent=state[tab].partners;document.getElementById(`${tab}_status`).textContent=`Registros filtrados: ${Number(data.registros||0).toLocaleString("es-MX")} | Tiendas visibles: ${Number(data.tiendasVisibles||0).toLocaleString("es-MX")}`;updatePartnerTable(tab);renderPartnerMarkers(tab)}
function getRoutineRows(tab){const qty=Number(state[tab].partners)||1;return ROUTINES[tab][qty]||ROUTINES[tab][Object.keys(ROUTINES[tab]).pop()]||[]}
function setPartners(tab){state[tab].partners=Number(document.getElementById(`${tab}_partners`).value);render(tab)}
function updatePartnerTable(tab){const rows=getRoutineRows(tab);document.getElementById(`${tab}_tbody`).innerHTML=rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join("")}
function renderPartnerMarkers(tab){const rows=getRoutineRows(tab);let supportIndex=0;const html=rows.map(r=>{const letter=r[0],station=r[1],isFlex=r[4]||r[2]==="No";let pos;if(isFlex){pos=SUPPORT_SLOTS[tab][supportIndex%SUPPORT_SLOTS[tab].length];supportIndex++}else{pos=POS[tab][station]||POS[tab][station.replace("  "," ")]||POS[tab]["Soporte"]||[50,70]}return `<div class="marker ${isFlex?"flex":"fixed"}" style="left:${pos[0]}%;top:${pos[1]}%;width:7%;height:${tab==="dt"?9:10}%">${letter}${isFlex?".":""}</div>`}).join("");document.getElementById(`${tab}_markers`).innerHTML=html}
function actualizarLayout(){render(activeTab)}
function showTab(tab){activeTab=tab;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));document.getElementById(tab).classList.add("active");document.getElementById(tab==="cafe"?"tabCafe":"tabDt").classList.add("active");render(tab)}
function cafeLayout(){return `<div class="area gray" style="left:0;top:0;width:14%;height:30%"></div><div class="area cbs" style="left:14%;top:0;width:22%;height:10%">CBS</div><div class="area brew" style="left:50%;top:0;width:22%;height:10%">Café Filtrado</div><div class="area horno" style="left:80%;top:0;width:7%;height:10%">Horno</div><div class="area horno" style="left:87%;top:0;width:7%;height:10%">Horno</div><div class="area pick" style="left:0;top:30%;width:7%;height:20%">Pick up</div><div class="area hand" style="left:0;top:50%;width:14%;height:10%">Hand off</div><div class="area espresso" style="left:20%;top:54%;width:7%;height:10%">Espresso</div><div class="area espresso" style="left:34%;top:54%;width:7%;height:10%">Espresso</div><div class="area pos" style="left:48%;top:54%;width:7%;height:10%">POS</div><div class="area pos" style="left:62%;top:54%;width:7%;height:10%">POS</div><div class="area food" style="left:78%;top:54%;width:14%;height:10%">Foodcase</div>`}
function dtLayout(){return `<div class="area gray" style="left:7%;top:0;width:90%;height:38%"></div><div class="area" style="left:14%;top:0;width:14%;height:10%;background:white">Ventana DT</div><div class="area" style="left:28%;top:10%;width:7%;height:9%;background:#ff99cc">DTR</div><div class="area" style="left:28%;top:19%;width:7%;height:9%;background:#ff99cc">DTO</div><div class="area cbs" style="left:7%;top:28%;width:7%;height:26%">CBS</div><div class="area pick" style="left:7%;top:54%;width:7%;height:18%">Pick up</div><div class="area hand" style="left:7%;top:72%;width:14%;height:9%">Hand off</div><div class="area brew" style="left:58%;top:28%;width:21%;height:9%">Café Filtrado</div><div class="area horno" style="left:86%;top:28%;width:7%;height:9%">Horno</div><div class="area horno" style="left:93%;top:28%;width:7%;height:9%">Horno</div><div class="area espresso" style="left:28%;top:72%;width:7%;height:9%">Espresso</div><div class="area espresso" style="left:42%;top:72%;width:7%;height:9%">Espresso</div><div class="area pos" style="left:58%;top:72%;width:7%;height:9%">POS</div><div class="area pos" style="left:72%;top:72%;width:7%;height:9%">POS</div><div class="area food" style="left:86%;top:72%;width:14%;height:9%">Foodcase</div>`}
document.addEventListener("click",e=>{if(!e.target.closest(".ms")){document.querySelectorAll(".ms").forEach(x=>x.classList.remove("open"))}});
function init(){if(typeof PBT_ENGINE==="undefined"){alert("No se encontró PBT_ENGINE. Verifica que data.js esté en la misma carpeta que index.html y que haya cargado correctamente.");return}buildPage("cafe");buildPage("dt");populateFilters();render("cafe")}
init();
</script>
