<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBT Web 2.0 Manual</title>

<style>
:root{
  --green:#00754a;
  --line:#b9b9b9;
  --text:#1f1f1f;
  --ok:#dff3e7;
  --bad:#ffe1e1;
  --gray:#aaa;
  --cbs:#cfe0f6;
  --pick:#ffc000;
  --hand:#d8ccff;
  --espresso:#9a856d;
  --pos:#c6e0b4;
  --food:#ffe699;
  --horno:#f4b183;
  --brew:#6f5445;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:var(--text);
}

.header{
  background:var(--green);
  color:white;
  padding:14px 18px;
  font-size:22px;
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.logo{font-size:24px}

.badge{
  background:white;
  color:var(--green);
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:12px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  position:sticky;
  top:0;
  z-index:50;
  background:#f5f5f5;
  padding:8px 0;
}

.tab{
  flex:1;
  border:none;
  background:#ddd;
  color:#111;
  padding:14px;
  border-radius:14px;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
}

.tab.active{
  background:var(--green);
  color:white;
}

.page{display:none}
.page.active{display:block}

.manual-top{
  display:grid;
  grid-template-columns:1fr 1.45fr 2fr;
  gap:12px;
  align-items:start;
  margin-bottom:12px;
}

.box{
  background:white;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}

.box-title{
  background:var(--green);
  color:white;
  text-align:center;
  padding:7px;
  font-weight:900;
  font-size:14px;
}

.box-body{padding:8px}

.turn-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
}

.label-mini{
  font-size:12px;
  font-weight:900;
  color:#333;
  text-align:center;
}

.manual-input{
  width:100%;
  border:1px solid #aaa;
  background:#e9e9e9;
  border-radius:0;
  text-align:center;
  font-size:16px;
  padding:7px;
}

.metric-grid{
  display:grid;
  gap:6px;
}

.channels-cafe{grid-template-columns:repeat(2,1fr)}
.channels-dt{grid-template-columns:repeat(3,1fr)}
.mix-grid{grid-template-columns:repeat(5,1fr)}

.metric{
  border:1px solid #c9c9c9;
  background:#f6f6f6;
  padding:6px;
  text-align:center;
}

.metric label{
  display:block;
  font-size:12px;
  font-weight:900;
  margin-bottom:4px;
}

.metric input{
  width:100%;
  border:none;
  background:#e6e6e6;
  text-align:center;
  font-size:16px;
  font-weight:700;
  padding:4px;
}

.total{
  margin-top:6px;
  padding:6px;
  text-align:center;
  border-radius:8px;
  font-weight:900;
}

.ok{background:var(--ok);color:var(--green)}
.bad{background:var(--bad);color:#a40000}

.section-title{
  background:var(--green);
  color:white;
  padding:10px;
  border-radius:10px 10px 0 0;
  font-weight:900;
  margin-top:12px;
}

.layout-wrap{
  background:white;
  border:2px solid #222;
  border-radius:0 0 10px 10px;
  overflow:hidden;
}

.layout{
  height:240px;
  position:relative;
  background:white;
}

.area{
  position:absolute;
  border:1px solid #111;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:11px;
  font-weight:900;
}

.gray{background:var(--gray)}
.cbs{background:var(--cbs)}
.pick{background:var(--pick)}
.hand{background:var(--hand)}
.espresso{background:var(--espresso)}
.pos{background:var(--pos)}
.food{background:var(--food)}
.horno{background:var(--horno)}
.brew{background:var(--brew);color:white}

.partner{
  background:var(--green);
  color:white;
  font-size:20px;
}

.support{
  background:white;
  color:var(--green);
  border:1px solid var(--green);
  font-size:18px;
}

details{
  background:white;
  border:1px solid var(--line);
  border-radius:10px;
  margin-top:4px;
  overflow:hidden;
}

summary{
  background:var(--green);
  color:white;
  padding:10px;
  font-weight:900;
  cursor:pointer;
}

.table-wrap{overflow-x:auto}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th{
  background:#006241;
  color:white;
  padding:7px;
  font-size:12px;
}

td{
  border:1px solid #777;
  padding:7px;
  font-size:12px;
}

@media(max-width:760px){
  .header{font-size:18px;padding:12px}
  .logo{font-size:20px}
  .tabs{overflow-x:auto}
  .tab{min-width:150px;padding:12px}
  .manual-top{grid-template-columns:1fr}
  .mix-grid{grid-template-columns:repeat(2,1fr)}
  .channels-cafe,.channels-dt{grid-template-columns:repeat(2,1fr)}

  .layout{
    height:190px;
    transform:scale(.82);
    transform-origin:top left;
    width:122%;
  }

  .layout-wrap{height:195px}
  .area{font-size:8px}
  .partner{font-size:14px}
}
</style>
</head>

<body>

  <div class="logo">☕ PBT Web 2.0</div>

    <button class="tab active" id="tabCafe" onclick="showTab('cafe')">CAFE</button>

  <section id="cafe" class="page active"></section>

    "POS 2":{left:62,top:40,w:7,h:10,fijo:true},

function round0(v){
  v = Number(v || 0);
  if(isNaN(v)) return 0;
  return Math.round(v);
}

function sumInputs(selector){
  return [...document.querySelectorAll(selector)].reduce((s,i)=>s+round0(i.value),0);
}

function validateTotals(tab){
  const chTotal = sumInputs(`.${tab}-channel`);
  const mixTotal = sumInputs(`.${tab}-mix`);

  document.getElementById(`${tab}_channelTotal`).textContent = `Total: ${chTotal}%`;
  document.getElementById(`${tab}_channelTotal`).className = chTotal===100 ? "total ok" : "total bad";

  document.getElementById(`${tab}_mixTotal`).textContent = `Total: ${mixTotal}%`;
  document.getElementById(`${tab}_mixTotal`).className = mixTotal===100 ? "total ok" : "total bad";
}

function buildPage(tab){
  const c = config[tab];

  document.getElementById(tab).innerHTML = `
    <div class="manual-top">
      <div class="box">
        <div class="box-title">Información de turno</div>
        <div class="box-body">
          <div class="turn-grid">
            <div class="label-mini">Partners</div>
            <select class="manual-input" id="${tab}_partners" onchange="setPartners('${tab}')">
              ${Array.from({length:c.maxPartners},(_,i)=>`
                <option value="${i+1}" ${i+1===state[tab].partners ? "selected" : ""}>${i+1}</option>
              `).join("")}
            </select>
          </div>
        </div>
      </div>

      <div class="box">
        <div class="box-title">Distribución de canales</div>
        <div class="box-body">
          <div class="metric-grid ${tab==="cafe" ? "channels-cafe" : "channels-dt"}">
            ${c.channelLabels.map((x,i)=>`
              <div class="metric">
                <label>${x}</label>
                <input class="${tab}-channel" type="number" min="0" max="100" step="1" value="${c.channelDefaults[i]}" oninput="this.value=round0(this.value);validateTotals('${tab}')">
              </div>
            `).join("")}
          </div>
          <div class="total ok" id="${tab}_channelTotal">Total: 100%</div>
        </div>
      </div>

      <div class="box">
        <div class="box-title">Mix de productos</div>
        <div class="box-body">
          <div class="metric-grid mix-grid">
            ${categories.map((x,i)=>`
              <div class="metric">
                <label>${x}</label>
                <input class="${tab}-mix" type="number" min="0" max="100" step="1" value="${c.mixDefaults[i]}" oninput="this.value=round0(this.value);validateTotals('${tab}')">
              </div>
            `).join("")}
          </div>
          <div class="total ok" id="${tab}_mixTotal">Total: 100%</div>
        </div>
      </div>
    </div>

    <div class="section-title">Plan de distribución recomendado — ${c.title}</div>

    <div class="layout-wrap">
      <div class="layout" id="${tab}_layout">${tab==="cafe" ? cafeLayout() : dtLayout()}</div>
    </div>

    <details open>
      <summary>Rutinas de Partners</summary>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Partner</th><th>Estación</th><th>Fijo</th><th>Rutinas</th></tr>
          </thead>
          <tbody id="${tab}_tbody"></tbody>
        </table>
      </div>
    </details>
  `;

  validateTotals(tab);
  updatePartnerTable(tab);
}

function getRoutineRows(tab){
  const qty = state[tab].partners;
  return ROUTINES[tab][qty] || [];
}

function setPartners(tab){
  state[tab].partners = Number(document.getElementById(`${tab}_partners`).value);
  updatePartnerTable(tab);
}

function updatePartnerTable(tab){
  const rows = getRoutineRows(tab);

  document.getElementById(`${tab}_tbody`).innerHTML = rows.map(r=>`
    <tr><td>${r[0]}</td><td>${r[1].replace("Soporte Alto","Soporte").replace("Soporte Bajo","Soporte").replace("Soporte Extra","Soporte").replace("Soporte Extra 2","Soporte")}</td><td>${r[2]}</td><td>${r[3]}</td></tr>
  `).join("");

  const layer = document.getElementById(`${tab}_markers`);
  layer.innerHTML = rows.map((r)=>{
    let p = POS[tab][r[1]];
    if(!p) p = POS[tab]["Soporte Bajo"] || POS[tab]["Soporte Alto"];

    const cls = p.fijo ? "partner" : "support";
    return `<div class="area ${cls}" data-letter="${r[0]}" style="left:${p.left}%;top:${p.top}%;width:${p.w}%;height:${p.h}%">${r[0]}</div>`;
  }).join("");
}

function showTab(tab){
  activeTab = tab;

  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  document.getElementById(tab==="cafe" ? "tabCafe" : "tabDt").classList.add("active");
}

function cafeLayout(){
