<script>
var MAPS={cafe:null,dt:null},activeTab='cafe';
var state={cafe:{filters:{q:[],daypart:[],mes:[],semana:[],weekpart:[],tienda:[]},partners:4},dt:{filters:{q:[],daypart:[],mes:[],semana:[],weekpart:[],tienda:[]},partners:11,partnerTablet:'No'}};
var config={cafe:{title:'CAFE',maxPartners:11,tipoEngine:'CAFE',channelLabels:[['Lobby','G14','lobby'],['Pick up & Delivery','H14','mop']]},dt:{title:'DRIVE THRU',maxPartners:13,tipoEngine:'DT',channelLabels:[['Lobby','G14','lobby'],['Pick up & Delivery','H14','mop'],['DT','I14','dt']]}};
var mixLabels=[['Espresso','K14','esp'],['Café filtrado','L14','brew'],['CBS','K15','cbs'],['Food','L15','food'],['Otro','K16','other']];
function round0(v){v=Number(v||0);return Number.isFinite?Number.isFinite(v)?Math.round(v):0:isFinite(v)?Math.round(v):0}function pctText(n){return round0(n)+'%'}function escHtml(v){return String(v||'').replace(/[&<>\"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]})}
function cleanPartnerName(v){
  return String(v||'')
    .replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ0-9 ._-]/g,'')
    .slice(0,8)
    .toUpperCase();
}
function getSourceList(name){if(name==='Q')return typeof PBT_QS!=='undefined'?PBT_QS:[];if(name==='DayPart')return typeof PBT_DAYPARTS!=='undefined'?PBT_DAYPARTS:[];if(name==='Mes')return typeof PBT_MESES!=='undefined'?PBT_MESES:[];if(name==='Semana')return typeof PBT_SEMANAS!=='undefined'?PBT_SEMANAS:[];if(name==='Weekpart')return typeof PBT_WEEKPARTS!=='undefined'?PBT_WEEKPARTS:[];if(name==='TiendaCafe')return typeof TIENDAS_CAFE!=='undefined'?TIENDAS_CAFE:[];if(name==='TiendaDT')return typeof TIENDAS_DT!=='undefined'?TIENDAS_DT:[];return []}
function buildPlayMap(tab){if(MAPS[tab])return MAPS[tab];var entries=(tab==='cafe'?EXCEL_DATA.cafePlayEntries:EXCEL_DATA.dtPlayEntries)||[],m={};for(var i=0;i<entries.length;i++)m[entries[i][0]]=entries[i][1];MAPS[tab]=m;return m}
function dist(a,b){var s=0;for(var i=0;i<8;i++){var d=(a[i]||0)-(b[i]||0);s+=d*d}return s}function nearestMix(tab,vals){var arr=(tab==='cafe'?EXCEL_DATA.cafeCandidates:EXCEL_DATA.dtCandidates)||[],best=arr[0]||[0,0,0,0,0,0,0,0],bd=Infinity;for(var i=0;i<arr.length;i++){var d=dist(arr[i],vals);if(d<bd){bd=d;best=arr[i];if(d===0)break}}return best}
function getPlay(tab,partners,channels,mix){var vals=tab==='cafe'?[channels.lobby,channels.mop,0,mix.esp,mix.brew,mix.cbs,mix.food,mix.other]:[channels.lobby,channels.mop,channels.dt,mix.esp,mix.brew,mix.cbs,mix.food,mix.other];var nearest=nearestMix(tab,vals.map?vals.map(round0):vals);var key=[round0(partners)].concat(nearest).join(',');var play=buildPlayMap(tab)[key];return{play:play,nearest:nearest,key:key}}
function cellPos(row,col){row=Number(row);col=Number(col);var startRow=18,rows=10,startCol=2,cols=14;return{left:(col-startCol)/cols*100,top:(row-startRow)/rows*100,width:100/cols,height:100/rows}}
function block(cls,row,col,rowspan,colspan,text){var p=cellPos(row,col);return '<div class="area '+cls+'" style="left:'+p.left+'%;top:'+p.top+'%;width:'+(p.width*colspan)+'%;height:'+(p.height*rowspan)+'%">'+text+'</div>'}
function staticLayout(tab){if(tab==='cafe')return [block('gray',18,2,3,3,''),block('cbs',18,5,1,3,'CBS'),block('brew',18,10,1,3,'Café Filtrado'),block('horno',18,13,1,1,'Horno'),block('horno',18,14,1,1,'Horno'),block('pick',21,2,2,1,'Pick up'),block('hand',23,2,1,2,'Hand off'),block('espresso',23,5,1,1,'Espresso'),block('espresso',23,7,1,1,'Espresso'),block('pos',23,9,1,1,'POS'),block('pos',23,11,1,1,'POS'),block('food',23,13,1,2,'Foodcase')].join('');return [block('gray',18,2,8,1,''),block('gray',18,4,3,7,''),block('empty-zone',18,15,8,1,''),block('',18,4,1,2,'Ventana DT'),block('',19,6,1,1,'DTR'),block('',20,6,1,1,'DTO'),block('cbs',22,3,2,1,'CBS'),block('pick',24,3,2,1,'Pick up'),block('hand',26,3,1,2,'Hand off'),block('brew',21,11,1,3,'Café Filtrado'),block('horno',21,14,1,1,'Horno'),block('horno',21,15,1,1,'Horno'),block('espresso',26,6,1,1,'Espresso'),block('espresso',26,8,1,1,'Espresso'),block('pos',26,10,1,1,'POS'),block('pos',26,12,1,1,'POS'),block('food',26,14,1,2,'Foodcase')].join('')}
function fallbackCoords(tab){return tab==='cafe'?[['',23,9,'A'],['',22,5,'B'],['',21,8,'C.'],['',24,8,'D.']]:[['',19,5,'A'],['',20,5,'B'],['',26,10,'C'],['',26,6,'D'],['',26,8,'E'],['',25,7,'F.'],['',23,4,'G'],['',22,4,'H'],['',23,4,'I.'],['',25,4,'J'],['',27,9,'K.']]}
function layoutMarkers(tab,play){try{var layoutName=tab==='cafe'?'Cafe_S_2M2O2P_Left_1':'Dt_L_2M2O2P_Left_1';var rows=(EXCEL_DATA.routines&&EXCEL_DATA.routines[play])||[];var fixedByPartner={};for(var i=0;i<rows.length;i++){var rr=rows[i];var lk=String(rr[0]).replace('.','').trim();fixedByPartner[lk]=String(rr[2]).toLowerCase().indexOf('s')===0||String(rr[2]).toLowerCase()==='yes'}var tabletOn=tab==='dt'&&state.dt&&state.dt.partnerTablet==='Sí';var raw=(EXCEL_DATA.coords&&EXCEL_DATA.coords[play])||[];var cs0=[];for(var j=0;j<raw.length;j++){var x=raw[j];if(x[0]===layoutName){var rowN=Number(x[1])+17;if(!(tab==='cafe'&&rowN>=25&&rowN<=27))cs0.push(x)}}var usingFallback=false;if(!cs0.length){cs0=fallbackCoords(tab);usingFallback=true}var movedTablet=null,cs=[];if(tabletOn&&!usingFallback){for(var k=0;k<cs0.length;k++){if(Number(cs0[k][1])===3&&Number(cs0[k][2])===4)movedTablet=cs0[k];else cs.push(cs0[k])}}else cs=cs0;var html='';for(var a=0;a<cs.length;a++){var item=cs[a],row,col,letter;if(usingFallback){row=item[1];col=item[2];letter=item[3]}else{row=Number(item[1])+17;col=Number(item[2])+1;letter=item[3]}var p=cellPos(row,col),clean=String(letter).replace('.','').trim(),cls=fixedByPartner[clean]===false?'support':'partner';if(clean==='C'||clean==='D'||clean==='F'||clean==='K'||clean==='L'||clean==='M'||clean==='O'||letter.indexOf('.')>-1)cls='support';var pname=getPartnerName(tab,clean);html+='<div class="area '+cls+' partner-marker" style="left:'+p.left+'%;top:'+p.top+'%;width:'+p.width+'%;height:'+p.height+'%">'+photoBubbleHTML(tab,pname)+'<span class="marker-letter">'+letter+'</span><span class="marker-name">'+escHtml(pname)+'</span></div>'}if(movedTablet){var letter2=movedTablet[3],clean2=String(letter2).replace('.','').trim(),cls2=fixedByPartner[clean2]?'partner':'support',p2=cellPos(18,10);var pname2=getPartnerName(tab,clean2);html+='<div class="area '+cls2+' partner-marker" title="Partner Tablet: E20 → J17" style="left:'+p2.left+'%;top:0%;width:'+p2.width+'%;height:'+p2.height+'%">'+photoBubbleHTML(tab,pname2)+'<span class="marker-letter">'+letter2+'</span><span class="marker-name">'+escHtml(pname2)+'</span></div>'}return html}catch(e){console.log('Fallback layoutMarkers iOS',e);return fallbackMarkers(tab)}}
