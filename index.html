<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBT Web 2.0</title>

<style>
:root{
  --green:#00754a;
  --green2:#006241;
  --line:#d9d9d9;
  --text:#1f1f1f;
  --ok:#dff3e7;
  --bad:#ffe1e1;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f5f5f5;
  color:var(--text);
}

.header{
  background:var(--green);
  color:white;
  padding:16px;
  font-size:24px;
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.logo{font-size:26px}

.badge{
  background:white;
  color:var(--green);
  padding:7px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:12px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  position:sticky;
  top:0;
  z-index:50;
  background:#f5f5f5;
  padding:8px 0;
}

.tab{
  flex:1;
  border:none;
  background:#ddd;
  color:#111;
  padding:15px;
  border-radius:14px;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
}

.tab.active{
  background:var(--green);
  color:white;
}

.page{display:none}
.page.active{display:block}

.card{
  background:white;
  border:1px solid var(--line);
  border-radius:14px;
  overflow:visible;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.card-title{
  background:var(--green);
  color:white;
  padding:10px;
  font-weight:900;
  text-align:center;
  border-radius:14px 14px 0 0;
}

.card-body{padding:12px}

.filters{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.filter label{
  display:block;
  font-weight:900;
  font-size:13px;
  margin-bottom:5px;
}

.ms{position:relative}

.ms-btn{
  width:100%;
  border:1px solid #bbb;
  background:white;
  border-radius:12px;
  padding:10px;
  min-height:42px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-size:13px;
}

.ms-panel{
  display:none;
  position:absolute;
  top:47px;
  left:0;
  right:0;
  background:white;
  border:1px solid #ccc;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  z-index:100;
  padding:8px;
  max-height:260px;
  overflow:auto;
}

.ms.open .ms-panel{display:block}

.ms-search{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:8px;
  margin-bottom:6px;
}

.ms-actions{
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

.ms-actions button{
  flex:1;
  border:none;
  border-radius:8px;
  padding:7px;
  background:#eee;
  font-weight:700;
  cursor:pointer;
}

.ms-option{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px;
  font-size:13px;
}

.ms-option input{
  width:18px;
  height:18px;
}

.partner-select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #bbb;
  font-weight:900;
}

.btn{
  background:var(--green);
  color:white;
  border:none;
  border-radius:12px;
  padding:12px 18px;
  font-weight:900;
  cursor:pointer;
  width:100%;
  margin-top:10px;
  font-size:15px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.metric-grid.channels.cafe{
  grid-template-columns:repeat(2,1fr);
}

.metric-grid.channels.dt{
  grid-template-columns:repeat(3,1fr);
}

.metric{
  background:#f4f4f4;
  border-radius:10px;
  padding:8px;
  text-align:center;
  border:1px solid #ddd;
}

.metric label{
  display:block;
  font-size:12px;
  font-weight:900;
}

.metric span{
  display:block;
  margin-top:4px;
  font-size:20px;
  font-weight:900;
  color:var(--green);
}

.total{
  margin-top:8px;
  padding:8px;
  text-align:center;
  border-radius:10px;
  font-weight:900;
}

.ok{background:var(--ok);color:var(--green)}
.bad{background:var(--bad);color:#a40000}

.section-title{
  background:var(--green);
  color:white;
  padding:10px;
  border-radius:12px;
  font-weight:900;
  margin:14px 0 8px;
}

.layout-wrap{
  background:white;
  border:2px solid #222;
  border-radius:12px;
  overflow:hidden;
}

.layout{
  height:330px;
  position:relative;
  background:white;
}

.area{
  position:absolute;
  border:1px solid #222;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:11px;
  font-weight:900;
}

.gray{background:#aaa}
.cbs{background:#cfe0f6}
.pick{background:#ffc000}
.hand{background:#d8ccff}
.espresso{background:#9a856d}
.pos{background:#c6e0b4}
.food{background:#ffe699}
.horno{background:#f4b183}
.brew{background:#6f5445;color:white}

.partner{
  background:var(--green);
  color:white;
  font-size:20px;
}

.support{
  background:white;
  color:var(--green);
  border:1px solid var(--green);
  font-size:18px;
}

details{
  background:white;
  border:1px solid var(--line);
  border-radius:14px;
  margin-top:12px;
  overflow:hidden;
}

summary{
  background:var(--green);
  color:white;
  padding:12px;
  font-weight:900;
  cursor:pointer;
}

.table-wrap{overflow-x:auto}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th{
  background:#006241;
  color:white;
  padding:8px;
  font-size:12px;
}

td{
  border:1px solid #bbb;
  padding:7px;
  font-size:12px;
}

.floating-update{
  position:fixed;
  bottom:18px;
  right:18px;
  z-index:200;
  background:var(--green);
  color:white;
  border:none;
  border-radius:999px;
  padding:14px 18px;
  font-weight:900;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  cursor:pointer;
}

.status{
  font-size:13px;
  color:#555;
  margin-top:8px;
}

@media(max-width:760px){
  .header{
    font-size:18px;
    padding:12px;
  }

  .logo{font-size:20px}
  .tabs{overflow-x:auto}

  .tab{
    min-width:150px;
    padding:12px;
  }

  .filters{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .grid2{grid-template-columns:1fr}

  .metric-grid,
  .metric-grid.channels.cafe,
  .metric-grid.channels.dt{
    grid-template-columns:repeat(2,1fr);
  }

  .layout{
    height:230px;
    transform:scale(.78);
    transform-origin:top left;
    width:128%;
  }

  .layout-wrap{height:235px}
  .area{font-size:8px}
  .partner{font-size:14px}

  .floating-update{
    left:16px;
    right:16px;
    bottom:12px;
    width:auto;
  }

  body{padding-bottom:70px}
}
</style>
</head>

function money(n){
  return Number(n || 0).toLocaleString("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0});
}

function pct(n){ return ${Math.round(Number(n || 0))}%; }

function getSourceList(name){
  if(name==="Q") return typeof PBT_QS!=="undefined" ? PBT_QS : [];
  if(name==="DayPart") return typeof PBT_DAYPARTS!=="undefined" ? PBT_DAYPARTS : [];
  if(name==="Mes") return typeof PBT_MESES!=="undefined" ? PBT_MESES : [];
  if(name==="Semana") return typeof PBT_SEMANAS!=="undefined" ? PBT_SEMANAS : [];
  if(name==="Weekpart") return typeof PBT_WEEKPARTS!=="undefined" ? PBT_WEEKPARTS : [];
  if(name==="TiendaCafe") return typeof TIENDAS_CAFE!=="undefined" ? TIENDAS_CAFE : [];
  if(name==="TiendaDT") return typeof TIENDAS_DT!=="undefined" ? TIENDAS_DT : [];
  return [];
}

function buildPage(tab){
  const c = config[tab];

  document.getElementById(tab).innerHTML = `
    <div class="card">
      <div class="card-title">Filtros dinámicos</div>
      <div class="card-body">
        <div class="filters">
          ${filterHTML(tab,"q","Q")}
          ${filterHTML(tab,"daypart","DayPart")}
          ${filterHTML(tab,"mes","Mes")}
          ${filterHTML(tab,"semana","Semana")}
          ${filterHTML(tab,"weekpart","Weekpart")}
          <div class="filter">
            <label>Partners</label>
            <select class="partner-select" id="${tab}_partners" onchange="setPartners('${tab}')">
              ${Array.from({length:c.maxPartners},(_,i)=>`
                <option value="${i+1}" ${i+1===state[tab].partners ? "selected" : ""}>${i+1}</option>
              `).join("")}
            </select>
          </div>
        </div>

        <div style="margin-top:10px">
          ${filterHTML(tab,"tienda", tab==="cafe" ? "Tienda (solo sin % DT)" : "Tienda (solo con % DT)")}
        </div>

        <button class="btn" onclick="actualizarLayout()">Actualizar Layout</button>
        <div class="status" id="${tab}_status">Base lista.</div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Distribución de canales</div>
        <div class="card-body">
          <div class="metric-grid channels ${tab}" id="${tab}_channels"></div>
          <div class="total ok" id="${tab}_channelTotal">Total: 100%</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Mix de productos</div>
        <div class="card-body">
          <div class="metric-grid" id="${tab}_mix"></div>
          <div class="total ok" id="${tab}_mixTotal">Total: 100%</div>
        </div>
      </div>
    </div>

    <div class="section-title">Plan de distribución recomendado — ${c.title}</div>

    <div class="layout-wrap">
      <div class="layout" id="${tab}_layout">${tab==="cafe" ? cafeLayout() : dtLayout()}</div>
    </div>

    <details>
      <summary>Rutinas de Partners</summary>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Partner</th><th>Estación</th><th>Fijo</th><th>Rutinas</th></tr>
          </thead>
          <tbody id="${tab}_tbody"></tbody>
        </table>
      </div>
    </details>
  `;
}

function filterHTML(tab,key,label){
  return `
  <div class="filter">
    <label>${label}</label>
    <div class="ms" id="${tab}_${key}_ms">
      <button class="ms-btn" type="button" onclick="toggleMS('${tab}','${key}')">
        <span id="${tab}_${key}_label">Todos</span><span>▾</span>
      </button>
      <div class="ms-panel">
        <input class="ms-search" placeholder="Buscar..." oninput="searchMS('${tab}','${key}',this.value)">
        <div class="ms-actions">
          <button type="button" onclick="selectAllMS('${tab}','${key}')">Todos</button>
          <button type="button" onclick="clearMS('${tab}','${key}')">Limpiar</button>
        </div>
        <div id="${tab}_${key}_options"></div>
      </div>
    </div>
  </div>`;
}

function populateFilters(){
  ["cafe","dt"].forEach(tab=>{
    fillMS(tab,"q",getSourceList("Q"));
    fillMS(tab,"daypart",getSourceList("DayPart"));
    fillMS(tab,"mes",getSourceList("Mes"));
    fillMS(tab,"semana",getSourceList("Semana"));
    fillMS(tab,"weekpart",getSourceList("Weekpart"));
    fillMS(tab,"tienda",tab==="cafe" ? getSourceList("TiendaCafe") : getSourceList("TiendaDT"));
  });
}

function fillMS(tab,key,values){
  const box = document.getElementById(${tab}_${key}_options);
  box.innerHTML = (values || []).map(v=>`
    <label class="ms-option" data-text="${String(v).toLowerCase()}">
      <input type="checkbox" value="${String(v).replaceAll('"','&quot;')}" onchange="changeMS('${tab}','${key}')">
      <span>${v}</span>
    </label>
  `).join("");
  updateMSLabel(tab,key);
}

function toggleMS(tab,key){
  document.querySelectorAll(".ms").forEach(x=>{
    if(x.id !== ${tab}_${key}_ms) x.classList.remove("open");
  });
  document.getElementById(${tab}_${key}_ms).classList.toggle("open");
}

function searchMS(tab,key,value){
  const q = String(value || "").toLowerCase();
  document.querySelectorAll(#${tab}_${key}_options .ms-option).forEach(o=>{
    o.style.display = o.dataset.text.includes(q) ? "flex" : "none";
  });
}

function changeMS(tab,key){
  state[tab].filters[key] = [...document.querySelectorAll(#${tab}_${key}_options input:checked)].map(x=>x.value);
  updateMSLabel(tab,key);
}

function selectAllMS(tab,key){
  document.querySelectorAll(#${tab}_${key}_options input).forEach(x=>x.checked=true);
  changeMS(tab,key);
}

function clearMS(tab,key){
  document.querySelectorAll(#${tab}_${key}_options input).forEach(x=>x.checked=false);
  changeMS(tab,key);
}

function updateMSLabel(tab,key){
  const arr = state[tab].filters[key] || [];
  document.getElementById(${tab}_${key}_label).textContent =
    arr.length === 0 ? "Todos" : arr.length === 1 ? arr[0] : ${arr.length} seleccionados;
}

function getEngineFilters(tab){
  const f = state[tab].filters;
  return {Q:f.q,DayPart:f.daypart,Mes:f.mes,Semana:f.semana,Weekpart:f.weekpart,Tienda:f.tienda};
}

function calculate(tab){
  if(typeof PBT_ENGINE === "undefined" || typeof PBT_ENGINE.calculate !== "function"){
    return {venta:0,registros:0,tiendasVisibles:0,mix:{},canales:{}};
  }
  return PBT_ENGINE.calculate(getEngineFilters(tab), config[tab].tipoEngine);
}

function canalValue(canales,k){
  if(k === "Pick up & Delivery"){
    return canales["Pick up & Delivery"] ?? canales.PickUpDelivery ?? canales["PickUpDelivery"] ?? 0;
  }
  return canales[k] ?? 0;
}

function render(tab){
  const c = config[tab];
  const data = calculate(tab);
  const mix = data.mix || {};
  const canales = data.canales || {};

  document.getElementById(${tab}_mix).innerHTML = categories.map(k=>`
    <div class="metric"><label>${k}</label><span>${pct(mix[k] || 0)}</span></div>
  `).join("");

  document.getElementById(${tab}_channels).innerHTML = c.channelLabels.map(k=>`
    <div class="metric"><label>${k}</label><span>${pct(canalValue(canales,k))}</span></div>
  `).join("");

  const mixTotal = categories.reduce((s,k)=>s + Number(mix[k] || 0),0);
  const channelTotal = c.channelLabels.reduce((s,k)=>s + Number(canalValue(canales,k)),0);

  document.getElementById(${tab}_mixTotal).textContent = Total: ${mixTotal}%;
  document.getElementById(${tab}_mixTotal).className = mixTotal === 100 ? "total ok" : "total bad";

  document.getElementById(${tab}_channelTotal).textContent = Total: ${channelTotal}%;
  document.getElementById(${tab}_channelTotal).className = channelTotal === 100 ? "total ok" : "total bad";

  document.getElementById(${tab}_status).textContent =
    Registros filtrados: ${Number(data.registros || 0).toLocaleString("es-MX")} | Tiendas visibles: ${Number(data.tiendasVisibles || 0).toLocaleString("es-MX")};

  updatePartnerTable(tab);
}

function getRoutineRows(tab){
  const qty = state[tab].partners;
  return ROUTINES[tab][qty] || ROUTINES[tab][Object.keys(ROUTINES[tab]).length];
}

function setPartners(tab){
  state[tab].partners = Number(document.getElementById(${tab}_partners).value);
  render(tab);
}

function updatePartnerTable(tab){
  const rows = getRoutineRows(tab);

  document.getElementById(${tab}_tbody).innerHTML = rows.map(r=>`
    <tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>
  `).join("");

  const layer = document.getElementById(${tab}_markers);
  layer.innerHTML = rows.map(r=>{
    const p = POS[tab][r[1]] || POS[tab]["Soporte"];
    const cls = p.fijo ? "partner" : "support";
    return <div class="area ${cls}" data-letter="${r[0]}" style="left:${p.left}%;top:${p.top}%;width:${p.w}%;height:${p.h}%">${r[0]}</div>;
  }).join("");
}

function actualizarLayout(){
  render(activeTab);
}

function showTab(tab){
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  document.getElementById(tab==="cafe" ? "tabCafe" : "tabDt").classList.add("active");
  render(tab);
}
